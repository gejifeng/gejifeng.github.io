  /* ══════════════════════════════════
     UTILITY DRAWING FUNCTIONS
  ══════════════════════════════════ */

  function rnd(n) { return (Math.random() - 0.5) * 2 * n; }

  function shakyLine(ctx, x1, y1, x2, y2, lw, col) {
    ctx.save();
    ctx.strokeStyle = col || C.blk; ctx.lineWidth = lw || 2.5; ctx.lineCap = 'round';
    var d = Math.hypot(x2 - x1, y2 - y1), steps = Math.max(4, Math.ceil(d / 9));
    ctx.beginPath(); ctx.moveTo(x1 + rnd(2), y1 + rnd(2));
    for (var i = 1; i <= steps; i++) {
      var t = i / steps;
      ctx.lineTo(x1 + (x2 - x1) * t + rnd(3.5), y1 + (y2 - y1) * t + rnd(3.5));
    }
    ctx.stroke(); ctx.restore();
  }

  function shakyRect(ctx, x, y, w, h, lw, col) {
    shakyLine(ctx, x, y, x + w, y, lw, col);
    shakyLine(ctx, x + w, y, x + w, y + h, lw, col);
    shakyLine(ctx, x + w, y + h, x, y + h, lw, col);
    shakyLine(ctx, x, y + h, x, y, lw, col);
  }

  function crown(ctx, x, y, sz, col) {
    col = col || C.gold; var s = sz;
    ctx.save(); ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.42); ctx.lineTo(x + s * 0.15, y + s * 0.08);
    ctx.lineTo(x + s * 0.32, y + s * 0.3); ctx.lineTo(x + s * 0.5, y - s * 0.05);
    ctx.lineTo(x + s * 0.68, y + s * 0.3); ctx.lineTo(x + s * 0.85, y + s * 0.08);
    ctx.lineTo(x + s, y + s * 0.42); ctx.lineTo(x, y + s * 0.42);
    ctx.stroke();
    [0.15, 0.5, 0.85].forEach(function (t) {
      ctx.beginPath(); ctx.arc(x + s * t, y + s * 0.08, s * 0.07, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();
    });
    ctx.restore();
  }

  function arrow(ctx, x1, y1, x2, y2, col, lw) {
    shakyLine(ctx, x1, y1, x2, y2, lw || 1.8, col || C.ink);
    var ang = Math.atan2(y2 - y1, x2 - x1), al = 10;
    ctx.save(); ctx.strokeStyle = col || C.ink; ctx.lineWidth = lw || 1.8; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - al * Math.cos(ang - 0.5), y2 - al * Math.sin(ang - 0.5));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - al * Math.cos(ang + 0.5), y2 - al * Math.sin(ang + 0.5));
    ctx.stroke(); ctx.restore();
  }

  /* ══════════════════════════════════
     GRAFFITI BACKGROUND LAYER
     Inspired by Basquiat: white/parchment
     ground, black paint slabs, red scrawl
     clusters, figure silhouettes, ink
     splatters, big words, circled symbols,
     thin arrow connectors, faint ruled
     paper lines, SAMO ghost.
     SF = scale factor for font sizes.
  ══════════════════════════════════ */
  function drawGraffiti(ctx, W, H, SF) {
    ctx.save();

    /* 1. large black paint slabs */
    ctx.fillStyle = C.blk;
    ctx.save(); ctx.globalAlpha = 0.13;
    ctx.translate(W * 0.78, H * 0.08); ctx.rotate(0.05);
    ctx.fillRect(0, 0, 28 * SF, H * 0.28);
    ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.11;
    ctx.translate(W * 0.04, H * 0.44); ctx.rotate(-0.04);
    ctx.fillRect(0, 0, W * 0.38, 14 * SF);
    ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.10;
    ctx.translate(W * 0.82, H * 0.84); ctx.rotate(0.08);
    ctx.fillRect(0, 0, 22 * SF, H * 0.1);
    ctx.restore();

    /* 2. red scrawl cluster — top left */
    ctx.save(); ctx.globalAlpha = 0.18; ctx.fillStyle = C.red;
    ctx.font = '900 ' + Math.round(11 * SF) + 'px "Permanent Marker",cursive';
    ctx.save(); ctx.translate(W * 0.02, H * 0.06); ctx.rotate(-0.08);
    ['LaboratoryTested', 'forStrength©', 'FLAME©', 'GRILLCHEESE'].forEach(function (l, i) {
      ctx.save(); ctx.rotate(rnd(0.08)); ctx.fillText(l, rnd(8), i * 13 * SF + rnd(4)); ctx.restore();
    });
    ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.10; ctx.fillStyle = C.red;
    ctx.translate(W * 0.04, H * 0.09); ctx.rotate(-0.15);
    ctx.beginPath(); ctx.ellipse(0, 0, 46 * SF, 30 * SF, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore(); ctx.restore();

    /* 3. large ghost words */
    ctx.save(); ctx.globalAlpha = 0.11;
    ctx.font = '900 ' + Math.round(54 * SF) + 'px "Permanent Marker",cursive';
    ctx.fillStyle = C.red;
    ctx.translate(W * 0.38, H * 0.42); ctx.rotate(0.04); ctx.fillText('FREE!', 0, 0);
    ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.09;
    ctx.font = '900 ' + Math.round(40 * SF) + 'px "Permanent Marker",cursive';
    ctx.fillStyle = C.blk;
    ctx.translate(W * 0.22, H * 0.74); ctx.rotate(-0.03); ctx.fillText('6,OOR', 0, 0);
    ctx.restore();

    /* 4. annotation block top-right */
    ctx.save(); ctx.globalAlpha = 0.15;
    ctx.font = '700 ' + Math.round(10 * SF) + 'px "Special Elite",cursive';
    ctx.fillStyle = C.blk;
    ctx.translate(W * 0.62, H * 0.05); ctx.rotate(0.01);
    ['MOUTH TESTED', 'FFO R ESTHETICS.'].forEach(function (l, i) { ctx.fillText(l, 0, i * 14 * SF); });
    ctx.strokeStyle = C.gold; ctx.lineWidth = 1.8;
    ctx.strokeRect(0, -11 * SF, 46 * SF, 14 * SF);
    ctx.restore();

    /* 5. circled-X symbols */
    function circledX(ctx, cx, cy, r, col, a) {
      ctx.save(); ctx.globalAlpha = a; ctx.strokeStyle = col; ctx.lineWidth = 2.2;
      ctx.beginPath(); ctx.arc(cx, cy, r * SF, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - r * SF * 0.65, cy - r * SF * 0.65); ctx.lineTo(cx + r * SF * 0.65, cy + r * SF * 0.65);
      ctx.moveTo(cx + r * SF * 0.65, cy - r * SF * 0.65); ctx.lineTo(cx - r * SF * 0.65, cy + r * SF * 0.65);
      ctx.stroke(); ctx.restore();
    }
    circledX(ctx, W * 0.68, H * 0.62, 14, C.grn, 0.20);
    circledX(ctx, W * 0.14, H * 0.78, 10, C.red, 0.15);

    /* 6. figure silhouettes */
    ctx.save(); ctx.globalAlpha = 0.12; ctx.fillStyle = '#1a4f8c';
    ctx.translate(W * 0.71, H * 0.22); ctx.scale(SF, SF);
    ctx.beginPath(); ctx.arc(8, 0, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(4, 7, 8, 22);
    ctx.fillRect(0, 29, 6, 18); ctx.fillRect(10, 29, 6, 18);
    ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.13; ctx.fillStyle = '#2d6a2d';
    ctx.translate(W * 0.1, H * 0.36); ctx.rotate(0.1);
    ctx.beginPath(); ctx.ellipse(0, 0, 28 * SF, 36 * SF, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.13; ctx.fillStyle = '#7a1a10';
    ctx.translate(W * 0.9, H * 0.28); ctx.rotate(0.2);
    ctx.beginPath(); ctx.ellipse(0, 0, 18 * SF, 22 * SF, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    /* 7. ink splatters */
    [
      { x: 0.38, y: 0.28, r: 4, c: C.blk, a: 0.18 }, { x: 0.52, y: 0.35, r: 3, c: C.blk, a: 0.15 },
      { x: 0.6,  y: 0.44, r: 2.5, c: C.blk, a: 0.14 }, { x: 0.3, y: 0.55, r: 2, c: C.red, a: 0.16 },
      { x: 0.75, y: 0.6,  r: 3,   c: C.blk, a: 0.12 }, { x: 0.18, y: 0.65, r: 2, c: C.red, a: 0.13 },
      { x: 0.44, y: 0.7,  r: 4,   c: C.blk, a: 0.10 }, { x: 0.82, y: 0.72, r: 2, c: C.blk, a: 0.13 },
      { x: 0.56, y: 0.8,  r: 2.5, c: C.red, a: 0.12 }, { x: 0.26, y: 0.86, r: 3, c: C.blk, a: 0.11 },
      { x: 0.66, y: 0.18, r: 2,   c: C.blk, a: 0.14 }, { x: 0.48, y: 0.52, r: 1.5, c: C.red, a: 0.15 }
    ].forEach(function (d) {
      ctx.save(); ctx.globalAlpha = d.a; ctx.fillStyle = d.c;
      ctx.beginPath(); ctx.arc(W * d.x, H * d.y, d.r * SF, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    });

    /* 8. thin arrow connectors */
    ctx.save(); ctx.globalAlpha = 0.12;
    arrow(ctx, W * 0.32, H * 0.32, W * 0.28, H * 0.4,  C.blk, 1.2);
    arrow(ctx, W * 0.55, H * 0.48, W * 0.68, H * 0.55, C.blk, 1.2);
    arrow(ctx, W * 0.4,  H * 0.6,  W * 0.34, H * 0.68, C.red, 1.2);
    ctx.restore();

    /* 9. scattered annotation words */
    [
      { t: '"ANY BROKEN COIL"',        x:0.01, y:0.82,  r:-0.02, s:9,  c:C.blk, a:0.16 },
      { t: 'No.73',                    x:0.01, y:0.84,  r:0,     s:8,  c:C.blk, a:0.16 },
      { t: 'ME.',                      x:0.25, y:0.32,  r:0.03,  s:9,  c:C.blk, a:0.18 },
      { t: 'ZU',                       x:0.2,  y:0.46,  r:-0.01, s:10, c:C.blk, a:0.16 },
      { t: 'WHITE GLOVES',             x:0.58, y:0.44,  r:0.02,  s:8,  c:C.blk, a:0.14 },
      { t: 'BIG DRUM',                 x:0.68, y:0.9,   r:0.01,  s:9,  c:C.blk, a:0.14 },
      { t: 'Hawkman.',                 x:0.72, y:0.68,  r:-0.02, s:9,  c:C.red, a:0.18 },
      { t: 'BLUE',                     x:0.48, y:0.54,  r:0.03,  s:11, c:'#1a4f8c', a:0.18 },
      { t: 'GOOD PLACE FOR A HAIRCUT', x:0.52, y:0.74,  r:0.01,  s:8,  c:C.blk, a:0.13 },
      { t: 'FLAKEE KCF',               x:0.35, y:0.8,   r:-0.02, s:9,  c:C.blk, a:0.15 },
      { t: 'CORII',                    x:0.33, y:0.73,  r:0.04,  s:13, c:C.blk, a:0.14 }
    ].forEach(function (d) {
      ctx.save(); ctx.globalAlpha = d.a;
      ctx.font = '700 ' + Math.round(d.s * SF) + 'px "Special Elite",cursive';
      ctx.fillStyle = d.c; ctx.translate(W * d.x, H * d.y); ctx.rotate(d.r); ctx.fillText(d.t, 0, 0);
      ctx.restore();
    });

    /* 10. SAMO ghost */
    ctx.save(); ctx.globalAlpha = 0.05;
    ctx.font = '900 ' + Math.round(70 * SF) + 'px "Permanent Marker",cursive';
    ctx.fillStyle = C.blk;
    ctx.translate(W * 0.05, H * 0.58); ctx.rotate(-0.22); ctx.fillText('SAMO', 0, 0);
    ctx.restore();

    /* 11. faint paper ruled lines */
    ctx.save(); ctx.strokeStyle = '#c0b09022'; ctx.lineWidth = 1;
    var lineGap = Math.round(32 * SF);
    for (var y = lineGap; y < H; y += lineGap) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.restore();

    ctx.restore();
  }

  /* ══════════════════════════════════
     SIDEBAR
  ══════════════════════════════════ */
  function drawSide(SF) {
    /* ── Mobile: horizontal top-bar ── */
    if (isMobile) {
      var W = window.innerWidth, H = 76;
      sc.setTransform(dpr, 0, 0, dpr, 0, 0);
      sc.clearRect(0, 0, W, H);

      sc.fillStyle = '#ede6cc'; sc.fillRect(0, 0, W, H);
      sc.save(); sc.strokeStyle = '#c0b09028'; sc.lineWidth = 1;
      [22, 44, 66].forEach(function(y) { sc.beginPath(); sc.moveTo(0, y); sc.lineTo(W, y); sc.stroke(); });
      sc.restore();
      sc.save(); sc.globalAlpha = 0.065; sc.fillStyle = C.red;
      sc.font = '700 8px "Special Elite",cursive';
      sc.translate(W * 0.36, 70); sc.rotate(-0.04);
      sc.fillText('tested for strength', 0, 0);
      sc.restore();
      shakyLine(sc, 0, H - 1.5, W, H - 1.5, 3, C.blk);

      /* crown + name block (far left) */
      crown(sc, 5, 4, 28, C.gold);
      sc.fillStyle = C.blk;
      sc.font = '900 12px "Permanent Marker",cursive';
      sc.fillText('JIFENG', 5, H - 7);

      /* TECH BLOG back button */
      var bX = 44, bY = 7, bW = Math.round(52 * SF), bHt = H - 15;
      shakyRect(sc, bX, bY, bW, bHt, 2, C.red);
      sc.fillStyle = C.red;
      sc.font = '900 9px "Permanent Marker",cursive';
      sc.fillText('\u2328BLOG', bX + 4, bY + bHt - 5);

      sideHits = [];
      sideHits.back = { x: bX, y: bY, w: bW, h: bHt };

      /* nav items spread across the bar */
      var nc = [C.blue, C.red, C.grn, C.gold, C.pur];
      var navX0 = bX + bW + 6;
      var navSlot = Math.floor((W - navX0 - 4) / NAV.length);
      NAV.forEach(function(label, i) {
        var act = (i === activeNav), col = nc[i];
        var nx = navX0 + i * navSlot;
        sc.fillStyle = act ? col : '#7a6a48';
        sc.font = act
          ? '900 ' + Math.round(11 * SF) + 'px "Permanent Marker",cursive'
          : '700 ' + Math.round(9  * SF) + 'px "Special Elite",cursive';
        sc.fillText(label, nx + 2, H - 9);
        if (act) shakyLine(sc, nx, H - 3, nx + navSlot - 4, H - 3, 3, col);
        sideHits.push({ x: nx, y: 0, w: navSlot, h: H, idx: i });
      });

      sc.fillStyle = '#9b8860';
      sc.font = '700 7px "Special Elite",cursive';
      sc.fillText('\u00A9', W - 10, H - 5);
      return;
    }

    var logW = 188, logH = window.innerHeight;

    /* Apply DPR scale so all coordinates are in logical CSS pixels */
    sc.setTransform(dpr, 0, 0, dpr, 0, 0);
    sc.clearRect(0, 0, logW, logH);

    var W = logW, H = logH;

    /* parchment background */
    sc.fillStyle = '#ede6cc'; sc.fillRect(0, 0, W, H);

    /* ruled lines */
    sc.save(); sc.strokeStyle = '#c0b09028'; sc.lineWidth = 1;
    var ruleGap = Math.round(30 * SF);
    for (var y = ruleGap; y < H; y += ruleGap) {
      sc.beginPath(); sc.moveTo(0, y); sc.lineTo(W, y); sc.stroke();
    }
    sc.restore();

    /* ghost red scrawl */
    sc.save(); sc.globalAlpha = 0.07; sc.fillStyle = C.red;
    sc.font = '700 ' + Math.round(9 * SF) + 'px "Special Elite",cursive';
    sc.translate(4, H * 0.72); sc.rotate(-0.3);
    ['tested', 'for', 'strength'].forEach(function (l, i) {
      sc.fillText(l, rnd(6), i * 11 * SF);
    });
    sc.restore();

    shakyLine(sc, W - 1, 0, W - 1, H, 3.5, C.blk);

    /* crown + name */
    var crownSz = Math.round(38 * SF);
    var crownY  = Math.round(18 * SF);
    crown(sc, 8, crownY, crownSz, C.gold);

    var nameY = Math.round(70 * SF);
    sc.fillStyle = C.blk;
    sc.font = '900 ' + Math.round(17 * SF) + 'px "Permanent Marker",cursive';
    sc.fillText('JIFENG', 8, nameY);
    sc.fillStyle = C.red;
    sc.font = '900 ' + Math.round(11 * SF) + 'px "Permanent Marker",cursive';
    sc.fillText('©', Math.round(103 * SF), Math.round(60 * SF));
    sc.fillStyle = C.red;
    sc.font = '700 ' + Math.round(9 * SF) + 'px "Special Elite",cursive';
    sc.fillText('PAINTER · MAKER', 8, Math.round(84 * SF));

    var divY = Math.round(92 * SF);
    shakyLine(sc, 6, divY, W - 6, divY, 2.5, C.blk);

    /* ⌨ TECH BLOG back button */
    var bY = Math.round(100 * SF);
    var bH = Math.round(28 * SF);
    var bW = W - 14;
    shakyRect(sc, 7, bY, bW, bH, 2.5, C.red);
    sc.fillStyle = C.red;
    sc.font = '900 ' + Math.round(10 * SF) + 'px "Permanent Marker",cursive';
    sc.fillText('\u2328 TECH BLOG', 13, bY + Math.round(18 * SF));

    var btnDivY = bY + bH + Math.round(8 * SF);
    shakyLine(sc, 6, btnDivY, W - 6, btnDivY, 2, C.ink);

    /* store hit areas in logical (CSS) pixel space */
    sideHits = [];
    sideHits.back = { x: 7, y: bY, w: bW, h: bH };

    /* Nav items distributed across 26%–76% of screen height — no dead zone */
    var navStartY = Math.round(Math.max(162 * SF, H * 0.26));
    var navStep   = Math.round(Math.max(42 * SF, H * 0.10));
    var ny = navStartY;
    var nc = [C.blue, C.red, C.grn, C.gold, C.pur];
    NAV.forEach(function (label, i) {
      var act = (i === activeNav), col = nc[i];
      var rowH = Math.round(26 * SF);
      if (act) {
        shakyRect(sc, 4, ny - Math.round(17 * SF), W - 8, rowH, 2.5, col);
        sc.fillStyle = col;
        sc.font = '900 ' + Math.round(13 * SF) + 'px "Permanent Marker",cursive';
      } else {
        sc.fillStyle = '#7a6a48';
        sc.font = '700 ' + Math.round(12 * SF) + 'px "Special Elite",cursive';
      }
      sc.fillText((act ? '\u25B6 ' : '') + label, 10, ny);
      if (act) crown(sc, W - Math.round(34 * SF), ny - Math.round(16 * SF), Math.round(24 * SF), col);
      sideHits.push({ x: 0, y: ny - Math.round(19 * SF), w: W, h: rowH + Math.round(8 * SF), idx: i });
      ny += navStep;
    });

    /* Ghost fill — large © and vertical SAMO anchor the dead space below nav */
    sc.save(); sc.globalAlpha = 0.055;
    sc.font = '900 ' + Math.round(100 * SF) + 'px "Permanent Marker",cursive';
    sc.fillStyle = C.blk;
    sc.save(); sc.translate(W * 0.06, H * 0.94); sc.rotate(0.07);
    sc.fillText('\u00A9', 0, 0);
    sc.restore(); sc.restore();

    sc.save(); sc.globalAlpha = 0.032;
    sc.font = '900 ' + Math.round(32 * SF) + 'px "Permanent Marker",cursive';
    sc.fillStyle = C.red;
    sc.save(); sc.translate(W * 0.52, H * 0.72); sc.rotate(-1.48);
    sc.fillText('SAMO', 0, 0);
    sc.restore(); sc.restore();

    sc.fillStyle = '#9b8860';
    sc.font = '700 ' + Math.round(8 * SF) + 'px "Special Elite",cursive';
    sc.fillText('\u00A9 SAMO WAS HERE', 8, H - Math.round(10 * SF));
  }

  /* ══════════════════════════════════
     POST CARD
  ══════════════════════════════════ */
  function drawPost(ctx, p, ox, oy, rot, bw, SF) {
    ctx.save(); ctx.translate(ox, oy); ctx.rotate(rot);
    var lh  = Math.round(16 * SF);
    var pad = Math.round(7  * SF);

    /* date */
    ctx.fillStyle = '#9b8860';
    ctx.font = '700 ' + Math.round(8.5 * SF) + 'px "Special Elite",cursive';
    ctx.fillText(p.date, 0, 0);

    /* title block — taller, more typographic impact */
    var th = Math.round(50 * SF);
    ctx.fillStyle = p.bc; ctx.fillRect(0, Math.round(6 * SF), bw, th);
    shakyRect(ctx, 0, Math.round(6 * SF), bw, th, 4, p.tc);
    ctx.fillStyle = p.tc;
    ctx.font = '900 ' + Math.round(18 * SF) + 'px "Permanent Marker",cursive';
    ctx.fillText(p.title, pad, Math.round(29 * SF), bw - pad * 2);
    ctx.font = '700 ' + Math.round(11.5 * SF) + 'px "Special Elite",cursive';
    ctx.fillText(p.sub,   pad, Math.round(47 * SF), bw - pad * 2);

    /* body lines */
    var by = th + Math.round(18 * SF);
    var bodyColours = [C.blk, C.red, C.blue, C.grn];
    p.body.forEach(function (line, i) {
      ctx.save(); ctx.translate(rnd(4), 0); ctx.rotate(rnd(0.016));
      ctx.fillStyle = bodyColours[i % 4];
      ctx.font = '700 ' + Math.round(10 * SF) + 'px "Special Elite",cursive';
      ctx.fillText(line, 2, by + i * lh, bw); ctx.restore();
    });

    /* strikethrough old → new */
    var sy = by + p.body.length * lh + Math.round(6 * SF);
    ctx.fillStyle = C.blk;
    ctx.font = '900 ' + Math.round(11 * SF) + 'px "Permanent Marker",cursive';
    ctx.fillText(p.stk, 2, sy);
    var sw = ctx.measureText(p.stk).width;
    ctx.strokeStyle = C.red; ctx.lineWidth = Math.round(2.8 * SF);
    ctx.beginPath(); ctx.moveTo(0, sy - Math.round(4 * SF)); ctx.lineTo(sw + Math.round(4 * SF), sy - Math.round(4 * SF)); ctx.stroke();
    ctx.fillStyle = C.red; ctx.fillText(' \u2192 ' + p.aft, sw + Math.round(4 * SF), sy, bw);

    /* tags */
    var tx = 0, ty = sy + Math.round(16 * SF);
    var tc = [p.tc, C.red, C.blue, C.grn];
    p.tags.forEach(function (tag, ti) {
      var col = tc[ti % tc.length];
      ctx.font = '700 ' + Math.round(8.5 * SF) + 'px "Special Elite",cursive';
      var tw = ctx.measureText(tag).width + Math.round(8 * SF);
      shakyRect(ctx, tx, ty - Math.round(11 * SF), tw, Math.round(13 * SF), 1.5, col);
      ctx.fillStyle = col; ctx.fillText(tag, tx + Math.round(4 * SF), ty, tw);
      tx += tw + Math.round(5 * SF);
      if (tx > bw - Math.round(20 * SF)) { tx = 0; ty += Math.round(16 * SF); }
    });

    ctx.restore();
  }

  /* ══════════════════════════════════
     MAIN CANVAS
  ══════════════════════════════════ */
  function drawMain(SF) {
    /* ── Mobile: portrait stacked layout ── */
    if (isMobile) {
      var W = window.innerWidth, H = Math.max(1, window.innerHeight - 76);
      mc.setTransform(dpr, 0, 0, dpr, 0, 0);
      mc.clearRect(0, 0, W, H);
      mc.fillStyle = '#f5f0e2'; mc.fillRect(0, 0, W, H);
      drawGraffiti(mc, W, H, SF);

      /* crown centred, label right of it */
      crown(mc, W * 0.36 - Math.round(18 * SF), Math.round(4 * SF), Math.round(38 * SF), C.gold);
      mc.save(); mc.translate(W * 0.56, Math.round(18 * SF)); mc.rotate(0.04);
      mc.fillStyle = C.ink;
      mc.font = '700 ' + Math.round(8 * SF) + 'px "Special Elite",cursive';
      mc.fillText('\u00A9 ' + NAV[activeNav] + ' / FIG.' + (activeNav + 1), 0, 0);
      mc.restore();

      var posts = PAGES[activeNav] || PAGES[0];
      var cW = Math.round(W * 0.87);
      var xOff = Math.round(W * 0.04);
      var mlay = [
        { x: xOff,               y: Math.round(H * 0.04),  rot: -0.030 },
        { x: Math.round(W*0.09), y: Math.round(H * 0.37),  rot:  0.038 },
        { x: xOff,               y: Math.round(H * 0.67),  rot: -0.022 }
      ];
      posts.forEach(function(p, i) {
        if (i < mlay.length) drawPost(mc, p, mlay[i].x, mlay[i].y, mlay[i].rot, cW, SF);
      });
      if (posts.length >= 2) arrow(mc, mlay[0].x + cW * 0.55, mlay[0].y + Math.round(118 * SF),
                                       mlay[1].x + cW * 0.40, mlay[1].y + Math.round(4  * SF), C.ink);
      if (posts.length >= 3) arrow(mc, mlay[1].x + cW * 0.50, mlay[1].y + Math.round(118 * SF),
                                       mlay[2].x + cW * 0.50, mlay[2].y + Math.round(4  * SF), C.red);

      /* mobile bottom banner */
      mc.save(); mc.translate(W * 0.04, H - Math.round(20 * SF)); mc.rotate(-0.018);
      var mbW = Math.round(W * 0.68);
      shakyRect(mc, 0, -Math.round(16 * SF), mbW, Math.round(22 * SF), 2.5, C.blk);
      mc.fillStyle = C.blk;
      mc.font = '700 ' + Math.round(11 * SF) + 'px "Permanent Marker",cursive';
      mc.fillText('\u2605  SAMO WAS HERE  \u2605', 5, -2);
      mc.restore();
      return;
    }

    var logW = window.innerWidth - 188;
    var logH = window.innerHeight;

    /* Apply DPR scale */
    mc.setTransform(dpr, 0, 0, dpr, 0, 0);
    mc.clearRect(0, 0, logW, logH);

    var W = logW, H = logH;
    mc.fillStyle = '#f5f0e2'; mc.fillRect(0, 0, W, H);

    drawGraffiti(mc, W, H, SF);

    /* diagonal tension line — raw Basquiat-style axis */
    mc.save(); mc.globalAlpha = 0.07;
    shakyLine(mc, W * 0.60, H * 0.01, W * 0.86, H * 0.93, 4.5, C.red);
    mc.restore();

    /* page label — angled, offset right of crown for asymmetric tension */
    mc.save(); mc.translate(W * 0.62, Math.round(24 * SF)); mc.rotate(0.065);
    mc.fillStyle = C.ink;
    mc.font = '700 ' + Math.round(9.5 * SF) + 'px "Special Elite",cursive';
    mc.fillText('\u00A9 JIFENG \u2014 ' + NAV[activeNav] + '  /  FIG.' + (activeNav + 1), 0, 0);
    mc.restore();

    /* crown — larger, slightly off-centre for visual tension */
    crown(mc, W * 0.42 - Math.round(28 * SF), Math.round(5 * SF), Math.round(60 * SF), C.gold);

    var posts = PAGES[activeNav] || PAGES[0];
    /* Variable card widths: hero (wide) / accent (narrow) / mid — deliberately mismatched */
    var cW0 = Math.min(Math.round(W * 0.46), Math.round(234 * SF));
    var cW1 = Math.min(Math.round(W * 0.28), Math.round(148 * SF));
    var cW2 = Math.min(Math.round(W * 0.42), Math.round(218 * SF));

    /* Diagonal Z-scatter: upper-left → upper-right → lower-center */
    var lay = [
      { x: Math.round(W * 0.02), y: Math.round(H * 0.07),  rot: -0.090, w: cW0 },
      { x: Math.round(W * 0.58), y: Math.round(H * 0.11),  rot:  0.075, w: cW1 },
      { x: Math.round(W * 0.15), y: Math.round(H * 0.50),  rot: -0.115, w: cW2 }
    ];

    posts.forEach(function (p, i) {
      if (i < lay.length) drawPost(mc, p, lay[i].x, lay[i].y, lay[i].rot, lay[i].w, SF);
    });

    /* Diagonal pull arrows — compositional tension, not a rote grid */
    if (posts.length >= 2) arrow(mc, lay[0].x + cW0 * 0.80, lay[0].y + Math.round(68 * SF), lay[1].x + cW1 * 0.10, lay[1].y + Math.round(22 * SF), C.ink);
    if (posts.length >= 3) arrow(mc, lay[1].x + cW1 * 0.40, lay[1].y + Math.round(95 * SF), lay[2].x + cW2 * 0.60, lay[2].y + Math.round(6  * SF), C.red);

    /* bottom banner — raw, wide, dragged left, aggressive tilt */
    mc.save(); mc.translate(W * 0.03, H - Math.round(42 * SF)); mc.rotate(-0.030);
    var bannerW = Math.min(Math.round(272 * SF), Math.round(W * 0.62));
    var bannerH = Math.round(28 * SF);
    shakyRect(mc, 0, -Math.round(21 * SF), bannerW, bannerH, 3.5, C.blk);
    mc.fillStyle = C.blk;
    mc.font = '700 ' + Math.round(13 * SF) + 'px "Permanent Marker",cursive';
    mc.fillText('\u2605  SAMO WAS HERE  \u2605', 8, -3);
    mc.restore();
  }

  /* ══════════════════════════════════
     INIT & EVENTS
  ══════════════════════════════════ */
  function init() {
    /* Refresh DPR (changes when moving between displays) */
    dpr = window.devicePixelRatio || 1;

    isMobile = window.innerWidth < 600;
    document.getElementById('bv').style.flexDirection = isMobile ? 'column' : 'row';

    var logH = window.innerHeight;
    var logSideW, logSideH, logMainW, logMainH, SF;

    if (isMobile) {
      logSideW  = window.innerWidth;
      logSideH  = 76;
      logMainW  = window.innerWidth;
      logMainH  = Math.max(1, logH - logSideH);
      SF        = Math.max(0.70, Math.min(1.05, logMainW / 420));

      bside.width  = Math.round(logSideW * dpr);
      bside.height = Math.round(logSideH * dpr);
      bside.style.width  = logSideW + 'px';
      bside.style.height = logSideH + 'px';

      bmain.width  = Math.round(logMainW * dpr);
      bmain.height = Math.round(logMainH * dpr);
      bmain.style.width  = logMainW + 'px';
      bmain.style.height = logMainH + 'px';
    } else {
      logSideW  = 188;
      logMainW  = Math.max(1, window.innerWidth - logSideW);
      logSideH  = logH;
      logMainH  = logH;
      SF        = Math.max(0.90, Math.min(1.95, Math.min(logMainW / 530, logH / 470)));

      bside.width  = Math.round(logSideW * dpr);
      bside.height = Math.round(logH     * dpr);
      bside.style.width  = logSideW + 'px';
      bside.style.height = logH     + 'px';

      bmain.width  = Math.round(logMainW * dpr);
      bmain.height = Math.round(logH     * dpr);
      bmain.style.width  = logMainW + 'px';
      bmain.style.height = logH     + 'px';
    }

    drawSide(SF);
    drawMain(SF);
  }

  bside.addEventListener('click', function (e) {
    var r  = bside.getBoundingClientRect();
    var mx = e.clientX - r.left, my = e.clientY - r.top;

    /* back to tech blog */
    var b = sideHits.back;
    if (b && mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      window.location.href = BLOG_URL;
      return;
    }

    /* nav item clicks */
    sideHits.forEach(function (h) {
      if (h && h.idx != null && mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) {
        if (h.idx !== activeNav) { activeNav = h.idx; init(); }
      }
    });
  });

  /* cursor feedback on sidebar hover */
  bside.addEventListener('mousemove', function (e) {
    var r  = bside.getBoundingClientRect();
    var mx = e.clientX - r.left, my = e.clientY - r.top;
    var hit = false;
    var b = sideHits.back;
    if (b && mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) hit = true;
    sideHits.forEach(function (h) {
      if (h && h.idx != null && mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) hit = true;
    });
    bside.style.cursor = hit ? 'pointer' : 'default';
  });

  /* Touch support for the top-bar / sidebar */
  bside.addEventListener('touchend', function(e) {
    e.preventDefault();
    var t = e.changedTouches[0];
    var r = bside.getBoundingClientRect();
    var mx = t.clientX - r.left, my = t.clientY - r.top;
    var b = sideHits.back;
    if (b && mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      window.location.href = BLOG_URL;
      return;
    }
    sideHits.forEach(function(h) {
      if (h && h.idx != null && mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) {
        if (h.idx !== activeNav) { activeNav = h.idx; init(); }
      }
    });
  }, { passive: false });

  window.addEventListener('resize', init);

  /* draw immediately with fallback fonts, then redraw with web fonts */
  init();
  document.fonts.ready.then(function () { init(); });

})();
</script>
</body>
